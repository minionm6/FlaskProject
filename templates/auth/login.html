{% set full_height = True %}
{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="col-md-6 col-lg-5">
    <div class="card bg-dark border-secondary">
        <div class="card-header border-secondary">
            <h5 class="mb-0"><i class="bi bi-box-arrow-in-right me-2" aria-hidden="true"></i>Вход</h5>
        </div>
        <div class="card-body">
            <form method="post">
                <div class="mb-3">
                    <label for="username" class="form-label"><i class="bi bi-person me-1" aria-hidden="true"></i>Имя пользователя</label>
                    <input type="text" class="form-control form-control-dark" id="username" name="username" required autocomplete="username" placeholder="Введите имя пользователя">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label"><i class="bi bi-lock me-1" aria-hidden="true"></i>Пароль</label>
                    <input type="password" class="form-control form-control-dark" id="password" name="password" required autocomplete="current-password" placeholder="Введите пароль">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Запомнить меня</label>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-2" aria-hidden="true"></i>Войти</button>
            </form>
        </div>
    </div>
    <p class="text-center text-secondary mt-3">
        Нет аккаунта? <a href="{{ url_for('auth.register') }}" class="text-decoration-none">Зарегистрируйтесь</a>
    </p>
</div>
{% endblock %}
